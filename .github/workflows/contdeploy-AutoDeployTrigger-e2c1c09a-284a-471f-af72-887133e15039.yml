name: Trigger auto deployment for contdeploy

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ master ]
    paths:
    - '**'
    - '.github/workflows/contdeploy-AutoDeployTrigger-e2c1c09a-284a-471f-af72-887133e15039.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.CONTDEPLOY_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.CONTDEPLOY_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.CONTDEPLOY_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }} 
          registryUrl: antuxtest.azurecr.io
          registryUsername: ${{ secrets.CONTDEPLOY_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.CONTDEPLOY_REGISTRY_PASSWORD }}
          containerAppName: contdeploy
          resourceGroup: OGFs241-1806-gayathri
          imageToBuild: antuxtest.azurecr.io/contdeploy:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


